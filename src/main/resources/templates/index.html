	<section>
		<!-- Start Slider  -->

		<div id="carouselExample" class="carousel slide">
			<div class="carousel-inner">
				<div class="carousel-item active">
					<img src="img/ecom1.png" class="d-block w-100" alt="..."
						height="350px">
				</div>
				<div class="carousel-item">
					<img src="img/ecom3.jpg" class="d-block w-100" alt="..."
						height="350px">
				</div>
				<div class="carousel-item">
					<img src="img/ecom2.jpg" class="d-block w-100" alt="..."
						height="350px">
				</div>
			</div>
			<button class="carousel-control-prev" type="button"
				data-bs-target="#carouselExample" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Previous</span>
			</button>
			<button class="carousel-control-next" type="button"
				data-bs-target="#carouselExample" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Next</span>
			</button>
		</div>

		<!-- End Slider  -->

		<!--< Start Category Module -->
		<div class="container">
			<div class="row">
				<p class="text-center fs-4">Category</p>
				<div class="col-md-2" th:each="c:${category}">
						<div class="card category-card rounded-circle shadow-lg mb-4 fade-in">
							<div class="card-body text-center p-4">
								<img th:src="@{'/img/category_img/'+${c.imageName}}" class="img-fluid rounded-circle mb-3 product-img" style="width: 120px; height: 120px; object-fit: cover;"><br>
								<h6 class="product-title fw-bold">[[${c.name}]]</h6>
								<a th:href="@{'/products?category='+${c.name}}" class="btn btn-primary-custom btn-sm">Shop Now</a>
							</div>
						</div>
				</div>

		<!-- Start Latest Product Module -->

		<div class="container-fluid py-5 bg-gradient" style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
			<div class="container">
				<h2 class="text-center mb-5 display-5 fw-bold text-dark" style="font-family: 'Playfair Display', serif;">
					<i class="fa-solid fa-fire text-warning me-3"></i>Latest Products
				</h2>

					<div class="row">
						<div class="col-lg-3 col-md-4 col-sm-6 mb-4 fade-in" th:each="p:${products}">
							<div class="card card-sh h-100">
								<img th:src="@{'/img/product_img/'+${p.image}}" alt="[[${p.title}]]" class="card-img-top product-img">
								<span class="discount-badge" th:if="${p.discount > 0}">[[${p.discount}]]% OFF</span>
								<div class="card-body d-flex flex-column">
									<h5 class="product-title">[[${p.title}]]</h5>
									<div class="price-section mt-auto">
										<div class="original-price" th:if="${p.discount > 0}">
											<i class="fa-solid fa-indian-rupee-sign"></i> [[${#numbers.formatDecimal(p.price, 0, 2)}]]
										</div>
										<div class="discounted-price">
											<i class="fa-solid fa-indian-rupee-sign me-1"></i> 
											<span th:text="${#numbers.formatDecimal(p.discountPrice, 0, 2)}">49.19</span>
										</div>
										<small class="text-white-50 fw-bold" th:if="${p.discount > 0}">
											<span class="badge bg-success">[[${p.discount}]]% OFF</span>
										</small>
									</div>
									<a th:href="@{'/product/'+${p.id}}" class="btn btn-primary-custom mt-3">View Details</a>
								</div>
							</div>
						</div>
					</div>
				</div>
